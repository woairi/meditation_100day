name: Deploy to GitHub Pages

# GITHUB_TOKEN으로는 Pages 사이트를 생성할 수 없어(admin 권한 필요)
# gh-pages 브랜치 방식을 사용한다: 이 브랜치에 푸시하면 GitHub가 자동으로 빌드/배포한다.
on:
  push:
    branches: [claude/100day-meditation-app-7mmdr1]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to gh-pages
        run: git push origin HEAD:gh-pages --force
