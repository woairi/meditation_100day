<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1420">
  <meta name="description" content="100일 동안 하루 10분, 명상 습관을 만들어요.">
  <title>명상 100일 챌린지</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <main id="app">
    <section id="screen-home" class="screen" hidden></section>
    <section id="screen-session" class="screen" hidden></section>
    <section id="screen-calendar" class="screen" hidden></section>
    <section id="screen-journal" class="screen" hidden></section>
    <section id="screen-settings" class="screen" hidden></section>
  </main>

  <nav id="tabbar" class="tabbar">
    <a href="#/" data-route="" class="tab" aria-label="홈">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 10.8 12 4l8.5 6.8"/><path d="M6 9.5V20h12V9.5"/></svg>
      <span class="tab-label">홈</span>
    </a>
    <a href="#/calendar" data-route="calendar" class="tab" aria-label="달력">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="5.5" width="16" height="14.5" rx="2"/><path d="M4 10.5h16M8.5 3.5V7M15.5 3.5V7"/></svg>
      <span class="tab-label">달력</span>
    </a>
    <a href="#/journal" data-route="journal" class="tab" aria-label="일지">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 5.5l4 4L8 20H4v-4z"/><path d="M12.5 7.5l4 4"/></svg>
      <span class="tab-label">일지</span>
    </a>
    <a href="#/settings" data-route="settings" class="tab" aria-label="설정">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h8M16 7h4M4 17h4M12 17h8"/><circle cx="14" cy="7" r="2"/><circle cx="10" cy="17" r="2"/></svg>
      <span class="tab-label">설정</span>
    </a>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
