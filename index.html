<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1420">
  <meta name="description" content="100일 동안 하루 10분, 명상 습관을 만들어요.">
  <title>명상 100일 챌린지</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <main id="app">
    <section id="screen-home" class="screen" hidden></section>
    <section id="screen-session" class="screen" hidden></section>
    <section id="screen-calendar" class="screen" hidden></section>
    <section id="screen-journal" class="screen" hidden></section>
  </main>

  <nav id="tabbar" class="tabbar">
    <a href="#/" data-route="" class="tab">
      <span class="tab-icon">🏠</span><span class="tab-label">홈</span>
    </a>
    <a href="#/calendar" data-route="calendar" class="tab">
      <span class="tab-icon">📅</span><span class="tab-label">달력</span>
    </a>
    <a href="#/journal" data-route="journal" class="tab">
      <span class="tab-icon">📝</span><span class="tab-label">일지</span>
    </a>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
